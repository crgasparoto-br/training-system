name: Deploy Production - Web

# Executa em todo push na branch principal de producao.
on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/deploy-staging-web.yml'

jobs:
  deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Setup Node + pnpm
      # -----------------------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # -----------------------------------------------------------------------
      # 3. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # -----------------------------------------------------------------------
      # 4. Type-check & build
      #
      #    Requer o secret abaixo:
      #      PRODUCTION_VITE_API_URL  - URL publica da API em producao
      #                                 ex: https://api.seudominio.com
      # -----------------------------------------------------------------------
      - name: Type-check Web
        run: pnpm --filter @corrida/web type-check

      - name: Build Web
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_VITE_API_URL }}
        run: pnpm --filter @corrida/web build

      # -----------------------------------------------------------------------
      # 5. Deploy
      #
      #    Provedor escolhido: Vercel
      #    Requer secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
      # -----------------------------------------------------------------------
      # No Vercel, configure tambem a env VITE_API_URL com o mesmo valor da API
      # de producao para evitar fallback para /api/v1 no dominio do frontend.

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: apps/web
