name: Deploy Production - API

# Executa em todo push na branch principal de producao.
on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'prisma/**'
      - '.github/workflows/deploy-staging-api.yml'

jobs:
  deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Setup Node + pnpm
      # -----------------------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # -----------------------------------------------------------------------
      # 3. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # -----------------------------------------------------------------------
      # 4. Type-check & build
      # -----------------------------------------------------------------------
      - name: Type-check API
        run: pnpm --filter @corrida/api type-check

      - name: Build API
        run: pnpm --filter @corrida/api build

      # -----------------------------------------------------------------------
      # 5. Run database migrations
      #
      #    Requer o secret abaixo:
      #      PRODUCTION_DATABASE_URL  - string de conexao do banco de producao
      # -----------------------------------------------------------------------
      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: pnpm --filter @corrida/api db:migrate:prod

      # -----------------------------------------------------------------------
      # 6. Deploy
      #
      #    Provedor escolhido: Render
      #    Requer o secret: RENDER_API_DEPLOY_HOOK_URL
      # -----------------------------------------------------------------------
      # O servico de API em producao tambem precisa destas variaveis no provedor:
      #   DATABASE_URL=<mesmo valor do banco de producao>
      #   NODE_ENV=production
      #   FRONTEND_URL=https://sistema-acesso.solveritconsultoria.com.br
      #   CORS_ORIGINS=https://sistema-acesso.solveritconsultoria.com.br
      #   JWT_SECRET=<segredo forte de producao>

      - name: Trigger Render deploy
        run: curl -fsSL -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK_URL }}"
